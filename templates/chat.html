<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dentist Assistant</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; }
      .wrap { max-width: 760px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.08); overflow: hidden; }
      .head { padding: 16px 20px; background: #2563eb; color: #fff; font-weight: 700; }
      .chat { height: 420px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
      .msg { padding: 10px 12px; border-radius: 10px; max-width: 85%; line-height: 1.4; }
      .you { align-self: flex-end; background: #dbeafe; }
      .bot { align-self: flex-start; background: #f3f4f6; }
      .form { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e5e7eb; }
      input { flex: 1; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; }
      button { border: none; background: #2563eb; color: #fff; padding: 10px 14px; border-radius: 8px; cursor: pointer; }
      .hint { padding: 0 12px 12px; color: #6b7280; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">🦷 Dentist Assistant</div>
      <div id="chat" class="chat"></div>
      <form id="form" class="form">
        <input id="message" autocomplete="off" placeholder="Type your question..." />
        <button type="submit">Send</button>
      </form>
      <div class="hint">Example: "book appointment", "how much cleaning", "are you open saturday"</div>
    </div>

    <script>
      const chat = document.getElementById('chat');
      const form = document.getElementById('form');
      const input = document.getElementById('message');
      let sessionId = null;

      function add(text, role) {
        const el = document.createElement('div');
        el.className = `msg ${role}`;
        el.textContent = text;
        chat.appendChild(el);
        chat.scrollTop = chat.scrollHeight;
      }

      add("Hi! I'm your dentist assistant. How can I help today?", 'bot');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = input.value.trim();
        if (!message) return;
        add(message, 'you');
        input.value = '';

        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: sessionId })
        });

        const data = await resp.json();
        sessionId = data.session_id;
        add(data.reply, 'bot');
      });
    </script>
  </body>
</html>
